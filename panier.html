<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Panier - Mymix Sem</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;700&family=Playfair+Display:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #C9A84C; --gold-light: #E8D48B; --black: #0D0D0D; --cream: #F9F6F0; --bordeaux: #6B1D1D; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--black); color:var(--cream); font-family:'Montserrat',sans-serif; min-height:100vh; padding:20px; }
        h1, h2 { font-family:'Playfair Display',serif; color:var(--gold); text-align:center; margin-bottom:20px; }
        .panier-page { max-width:800px; margin:0 auto; }
        .panier-vide { text-align:center; color:#aaa; font-size:1.2rem; padding:50px; }
        table { width:100%; border-collapse:collapse; margin:15px 0; }
        th { color:var(--gold-light); border-bottom:2px solid var(--gold); padding:10px 6px; text-transform:uppercase; font-size:0.85rem; }
        td { border-bottom:1px solid #333; padding:10px 6px; font-size:0.95rem; }
        .qte-btn { background:#1a1a1a; border:1px solid #555; color:var(--cream); width:28px; height:28px; border-radius:4px; cursor:pointer; font-size:1.1rem; }
        .suppr-btn { background:transparent; border:1px solid var(--bordeaux); color:var(--bordeaux); padding:5px 10px; border-radius:4px; cursor:pointer; font-size:0.8rem; }
        .total { font-size:1.5rem; color:var(--gold); text-align:right; margin:15px 0; }
        .actions { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin-top:20px; }
        .btn { padding:12px 22px; font-weight:600; border-radius:4px; cursor:pointer; text-decoration:none; font-size:0.95rem; display:inline-block; }
        .btn-retour { border:1px solid var(--gold); color:var(--gold); background:transparent; }
        .btn-vider { border:1px solid var(--bordeaux); color:var(--bordeaux); background:transparent; }
        .btn-whatsapp { background:#25D366; color:#fff; border:none; width:100%; margin-top:10px; font-size:1.1rem; padding:14px; }
        .suggestions { display:flex; gap:15px; flex-wrap:wrap; justify-content:center; margin-top:30px; }
        .sugg-card { background:#111; border:1px solid #333; border-radius:4px; width:150px; text-align:center; padding:10px; }
        .sugg-card img { width:100%; height:100px; object-fit:cover; border-radius:4px; }
        .sugg-card p { font-size:0.8rem; color:var(--gold-light); margin:5px 0; }
        .sugg-card button { background:var(--gold); color:var(--black); border:none; padding:5px 10px; cursor:pointer; border-radius:4px; font-size:0.7rem; margin-top:5px; }
    </style>
</head>
<body>
    <div class="panier-page">
        <h1>🛍️ Mon Panier</h1>
        <div id="panier-contenu"><p class="panier-vide">Chargement...</p></div>
        <h2 style="margin-top:40px;">✨ Vous pourriez aussi aimer</h2>
        <div class="suggestions" id="suggestions"></div>
    </div>
    <script src="assets/js/panier.js"></script>
</body>
</html>
