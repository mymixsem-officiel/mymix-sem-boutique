<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Mymix Sem</title>
    <style>
        :root { --gold: #C9A84C; --black: #0D0D0D; --cream: #F9F6F0; --bordeaux: #6B1D1D; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--black); color:var(--cream); font-family:'Montserrat',sans-serif; padding:20px; }
        h1 { color:var(--gold); text-align:center; margin-bottom:30px; }
        .stats { display:flex; gap:20px; justify-content:center; margin-bottom:30px; flex-wrap:wrap; }
        .stat-card { background:#111; border:1px solid var(--gold); padding:20px; border-radius:8px; text-align:center; min-width:150px; }
        .stat-card h3 { color:var(--gold); font-size:1.5rem; }
        .stat-card p { color:#aaa; font-size:0.26rem; }
        table { width:100%; border-collapse:collapse; }
        th { color:var(--gold); border-bottom:2px solid var(--gold); padding:8px; text-align:left; font-size:0.42rem; }
        td { border-bottom:1px solid #333; padding:8px; color:var(--cream); font-size:0.4rem; }
        .btn-suppr { background:var(--bordeaux); color:#fff; border:none; padding:5px 12px; cursor:pointer; border-radius:4px; font-size:0.4rem; }
        .btn-suppr:hover { background:#ff4444; }
        .btn-retour { display:inline-block; margin-top:20px; background:var(--gold); color:var(--black); padding:8px 16px; text-decoration:none; border-radius:4px; font-size:0.42rem; }
    </style>
</head>
<body>
<script>        var code = prompt('Mot de passe admin :');        if (code !== 'chantal2026') {            document.body.innerHTML = '<div style="background:#0D0D0D;width:100%;height:100vh;display:flex;align-items:center;justify-content:center;"><p style="color:#C9A84C;font-size:1.5rem;text-align:center;font-family:sans-serif;">🔒 Accès refusé.<br>Revenez dans 5 minutes.</p></div>';            setTimeout(function() { window.close(); }, 3000);        }    </script>
</body>
</html>
