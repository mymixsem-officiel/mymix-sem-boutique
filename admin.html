<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Mymix Sem</title>
    <style>
        :root { --gold: #C9A84C; --black: #0D0D0D; --cream: #F9F6F0; --bordeaux: #6B1D1D; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--black); color:var(--cream); font-family:'Montserrat',sans-serif; padding:20px; font-size:0.5rem; }
        h1 { color:var(--gold); text-align:center; margin-bottom:20px; font-size:0.8rem; }
        h2 { color:var(--gold); margin-bottom:15px; font-size:0.6rem; }
        .stats { display:flex; gap:20px; justify-content:center; margin-bottom:30px; flex-wrap:wrap; }
        .stat-card { background:#111; border:1px solid var(--gold); padding:20px; border-radius:8px; text-align:center; min-width:150px; }
        .stat-card h3 { color:var(--gold); font-size:1rem; }
        .stat-card p { color:#aaa; font-size:0.4rem; }
        table { width:100%; border-collapse:collapse; margin-bottom:30px; }
        th { color:var(--gold); border-bottom:2px solid var(--gold); padding:8px; text-align:left; font-size:0.5rem; }
        td { border-bottom:1px solid #333; padding:8px; color:var(--cream); font-size:0.45rem; }
        .btn-suppr { background:var(--bordeaux); color:#fff; border:none; padding:5px 12px; cursor:pointer; border-radius:4px; font-size:0.4rem; }
        .btn-retour { display:inline-block; margin-top:20px; background:var(--gold); color:var(--black); padding:8px 16px; text-decoration:none; border-radius:4px; font-size:0.5rem; }
    </style>
</head>
<body>
    <h1>📊 Tableau de bord - Mymix Sem</h1>
    <div class="stats">
        <div class="stat-card"><h3 id="nb-comptes">0</h3><p>Comptes créés</p></div>
        <div class="stat-card"><h3 id="nb-commandes">0</h3><p>Commandes WhatsApp</p></div>
    </div>
    
    <h2>👥 Membres inscrits</h2>
    <table><thead><tr><th>ID</th><th>Nom</th><th>Prénom</th><th>Numéro</th><th>Actions</th></tr></thead><tbody id="liste-membres"></tbody></table>
    
    <h2>🛒 Commandes passées</h2>
    <table><thead><tr><th>Date</th><th>Produits</th><th>Total</th></tr></thead><tbody id="liste-commandes"></tbody></table>
    
    <a href="index.html" class="btn-retour">⬅ Retour au site</a>

    <script>
        var code = prompt('Mot de passe admin :');
        if (code !== 'chantal2026') {
            document.body.innerHTML = '<div style="background:#0D0D0D;width:100%;height:100vh;display:flex;align-items:center;justify-content:center;"><p style="color:#C9A84C;font-size:1.5rem;text-align:center;">🔒 Accès refusé.<br>Revenez dans 5 minutes.</p></div>';
            setTimeout(function() { window.close(); }, 3000);
        } else {
            chargerMembres();
            chargerCommandes();
        }
        
        function chargerMembres() {
            var users = JSON.parse(localStorage.getItem('mymix-users')) || [];
            document.getElementById('nb-comptes').textContent = users.length;
            var tbody = document.getElementById('liste-membres');
            tbody.innerHTML = '';
            users.forEach(function(u, index) {
                var tr = document.createElement('tr');
                tr.innerHTML = '<td>'+u.id+'</td><td>'+u.nom+'</td><td>'+u.prenom+'</td><td>'+u.tel+'</td><td><button class="btn-suppr" onclick="supprimerMembre('+index+')">🗑 Supprimer</button></td>';
                tbody.appendChild(tr);
            });
        }
        
        function supprimerMembre(index) {
            if (confirm('Supprimer ce membre ?')) {
                var users = JSON.parse(localStorage.getItem('mymix-users')) || [];
                users.splice(index, 1);
                localStorage.setItem('mymix-users', JSON.stringify(users));
                chargerMembres();
            }
        }
        
        function chargerCommandes() {
            var commandes = JSON.parse(localStorage.getItem('mymix-commandes')) || [];
            document.getElementById('nb-commandes').textContent = commandes.length;
            var tbody = document.getElementById('liste-commandes');
            tbody.innerHTML = '';
            commandes.forEach(function(c) {
                var tr = document.createElement('tr');
                tr.innerHTML = '<td>'+c.date+'</td><td>'+c.produits+'</td><td style="color:#C9A84C;font-weight:bold;">'+c.total+' FCFA</td>';
                tbody.appendChild(tr);
            });
        }
    </script>
</body>
</html>
